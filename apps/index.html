<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore EverGray Tech applications, including Plot Your Path — a local-first career intelligence workspace for clearer role search and growth decisions.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://evergraytech.com/apps">
    <meta property="og:title" content="EverGray Tech Apps">
    <meta property="og:description" content="Explore EverGray Tech applications, including Plot Your Path.">
    <meta property="og:image" content="https://evergraytech.com/vendor/design-system/logo.svg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="EverGray Tech Apps">
    <meta name="twitter:description" content="Explore EverGray Tech applications, including Plot Your Path.">
    <title>Apps | EverGray Tech</title>
    <link rel="icon" type="image/svg+xml" href="/vendor/design-system/logo.svg">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <header class="site-header">
        <div class="container site-header-inner">
            <a href="/" class="site-brand" aria-label="EverGray Tech home">
                <img src="/vendor/design-system/logo.svg" alt="" class="site-brand-logo">
                <span class="site-brand-text">EverGray Tech</span>
            </a>

            <nav class="site-nav" aria-label="Primary">
                <a href="/#about" class="site-nav-link">About</a>
                <a href="/apps" class="site-nav-link" aria-current="page">Apps</a>
                <a href="/#contact" class="site-nav-link">Contact</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero hero--compact" aria-labelledby="apps-title">
            <div class="container">
                <div class="hero-content hero-content--left">
                    <p class="section-eyebrow">Apps</p>
                    <h1 id="apps-title" class="hero-title">Software built to support clearer decisions and stronger workflows.</h1>
                </div>
            </div>
        </section>

        <section class="apps-section" aria-label="Current Apps">
            <div class="container">
                <div id="apps-directory-status" class="app-runtime-message reveal" aria-live="polite">
                    Loading app catalog…
                </div>
                <div id="apps-directory" class="app-grid reveal" data-delay="1"></div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p class="footer-text">&copy; 2026 EverGray Tech. All rights reserved.</p>
            <div class="footer-links">
                <a href="https://www.linkedin.com/company/EverGrayTech" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn Company Profile">LinkedIn</a>
                <a href="mailto:hello@EverGrayTech.com" aria-label="Email EverGray Tech">Contact</a>
            </div>
        </div>
    </footer>
    <script src="/apps/app-registry.js"></script>
    <script src="/apps/apps-data.js"></script>
    <script>
        (function () {
            const appsDirectory = document.getElementById('apps-directory');
            const statusMessage = document.getElementById('apps-directory-status');
            const registry = window.EverGrayTechAppsData.getAppRegistry();

            function renderAppCard(app) {
                const logoMarkup = app.assets.logo
                    ? '<img src="' + window.EverGrayTechAppsData.escapeHtml(app.assets.logo) + '" alt="" class="app-card-logo">'
                    : '';
                const outcomes = app.overview && app.overview.outcomes && Array.isArray(app.overview.outcomes.items)
                    ? app.overview.outcomes.items.slice(0, 4)
                    : [];
                const outcomesMarkup = outcomes.length
                    ? '<ul class="app-card-capabilities">' + outcomes.map(function (item) {
                        return '<li>' + window.EverGrayTechAppsData.escapeHtml(item) + '</li>';
                    }).join('') + '</ul>'
                    : '';

                return [
                    '<article class="app-card">',
                    '  <div class="app-card-content">',
                    '      <div class="app-card-brand">',
                    logoMarkup,
                    '          <div>',
                    '              <h3 class="app-card-title">' + window.EverGrayTechAppsData.escapeHtml(app.name) + '</h3>',
                    '              <p class="app-card-status">' + window.EverGrayTechAppsData.escapeHtml(app.status) + ' - ' + window.EverGrayTechAppsData.escapeHtml(app.version) + '</p>',
                    '          </div>',
                    '      </div>',
                    '      <h4 class="app-card-tagline">' + window.EverGrayTechAppsData.escapeHtml(app.tagline) + '</h4>',
                    '      <p class="app-card-description">' + window.EverGrayTechAppsData.escapeHtml(app.shortDescription) + '</p>',
                    outcomesMarkup,
                    '  </div>',
                    '  <div class="app-card-actions">',
                    app.urls.app ? '      <a href="' + window.EverGrayTechAppsData.escapeHtml(app.urls.app) + '" class="cta-button" target="_blank" rel="noopener noreferrer">Open App</a>' : '',
                    app.urls.repo ? '      <a href="' + window.EverGrayTechAppsData.escapeHtml(app.urls.repo) + '" class="button-secondary" target="_blank" rel="noopener noreferrer">View Repo</a>' : '',
                    '  </div>',
                    '</article>'
                ].join('');
            }

            if (!registry.length) {
                statusMessage.textContent = 'No apps are currently configured for the catalog.';
                statusMessage.classList.add('app-runtime-message--error');
                window.EverGrayTechAppsData.initRevealObserver();
                return;
            }

            Promise.all(registry.map(window.EverGrayTechAppsData.fetchAppMetadata))
                .then(function (apps) {
                    appsDirectory.innerHTML = apps.map(renderAppCard).join('');
                    statusMessage.remove();
                    window.EverGrayTechAppsData.initRevealObserver();
                })
                .catch(function () {
                    statusMessage.innerHTML = 'The live app catalog is temporarily unavailable. You can still <a href="https://plot.evergraytech.com" target="_blank" rel="noopener noreferrer">open Plot Your Path</a> directly.';
                    statusMessage.classList.add('app-runtime-message--error');
                    window.EverGrayTechAppsData.initRevealObserver();
                });
        })();
    </script>
</body>
</html>
